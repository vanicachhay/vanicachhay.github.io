<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Fundamental CSS comprehension</title>
<style>
  body {
    margin: 0;
  }

  html {
    font-family: 'Helvetica neue', Arial, 'sans serif';
    font-size: 10px;
    background-color: #ccc;
  }

  .card {
    width: 35em;
    height: 22em;
    margin: 5em auto;
    background-color: red;
    border: 0.2em solid black;
    border-radius: 1.5em;
  }

  .card article img {
    max-height: 100%;
    float: right;
  }

  .card footer {
    background-image: linear-gradient(to bottom,rgba(0,0,0,0.1), rgba(0,0,0,0));
    border-radius: 1.5em 1.5em 0 0;
  }

  .card header {
    background-image: linear-gradient(to bottom,rgba(0,0,0,0), rgba(0,0,0,0.1));
    border-radius: 0 0 1.5em 1.5em;
  }
</style>
</head>
<body>

<section class="card">
  <header>
    <h2>Chris Mills</h2>
  </header>
  <article>
    <img src="chris.jpg" alt="A picture of Chris - a man with glasses, a beard, and a silly wooly hat" width="225" height="160">
    <p>50 My Street<br>
       The Town<br>
       Gray Peach<br>
       UK<br>
       ZO50 1MU<br>
      <strong>Tel</strong>: 01234 567 890<br>
      <strong>Mail</strong>: chris@nothere.com</p>
  </article>
  <footer>
    <p>Editing, writing, and web development services</p>
  </footer>
</section>

<section class="card" style="background-color: pink;">
  <header>
    <h2>Kylie Jenner</h2>
  </header>
  <article>
    <img src="kyliejenner.jpeg" alt="A picture of kylie jenner" width="225" height="160" >
    <p>hollywood street<br>
       The City<br>
       Los Angeles<br>
       USA<br>
       90210<br>
      <strong>Tel</strong>: 987-654-3210<br>
      <strong>Mail</strong>: kyliepookie@gmail.com</p>
  </article>
  <footer>
    <p>model and entrepreneaur</p>
  </footer>
</section>

</body>
</html>
