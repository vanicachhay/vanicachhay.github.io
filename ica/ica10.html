<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Elements</title>
<style>
    body {
        font-family: Georgia, 'Times New Roman', Times, serif;
        text-align: center;
    }
    .button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        margin: 20px;
    }
    #changeColorBtn {
        background-color: #007bff;
        color: #fff;
        border: none;
    }
    #changeTextBtn {
        background-color: #28a745;
        color: #fff;
        border: none;
    }
    #output {
        font-size: 24px;
        margin-top: 50px;
    }
</style>
</head>
<body>
    <h1>Interactive Elements</h1>
    <button id="changeColorBtn" class="button">Change Background Color</button>
    <button id="changeTextBtn" class="button">Change Text Content</button>
    <div id="output">Click a button to see the change!</div>

    <script>
        const changeColorBtn = document.getElementById('changeColorBtn');
        const changeTextBtn = document.getElementById('changeTextBtn');
        const output = document.getElementById('output');

       
        changeColorBtn.addEventListener('click', function() {
            document.body.style.backgroundColor = getRandomColor();
            output.textContent = 'Background color changed!';
        });

        
        changeTextBtn.addEventListener('click', function() {
            output.textContent = 'Text content changed!';
        });

    
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }
    </script>
</body>
</html>
