<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="wa11.css">
</head>
<body>
  <h1>Image Gallery of Anime Foods</h1>

  <div class="gallery">
    <div class="full-img">
      <img class="displayed-img" src="hamroastpic.jpg" alt="Ham Roast" />
      
      <div class="overlay"></div>
      <button class="toggle-mode">Toggle Mode</button>
    </div>

    <div class="thumb-bar">
        <img class="displayed-img" src="hamroastpic.jpg" alt="Ham Roast" />
        <img class="displayed-img" src="veggie.jpg" alt="Veggies" />
        <img class="displayed-img" src="eggs benedict.jpg" alt="Eggs" />
        <img class="displayed-img" src="pork roast" alt="Pork Roast" />
    </div>
  </div>

  <script src="wa11.js"></script>
</body>
</html>
